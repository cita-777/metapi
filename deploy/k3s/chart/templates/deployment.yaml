apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "metapi.fullname" . }}
  labels:
    {{- include "metapi.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.deployment.strategy.maxSurge }}
      maxUnavailable: {{ .Values.deployment.strategy.maxUnavailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "metapi.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "metapi.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        metapi/image-tag: {{ .Values.image.tag | quote }}
        metapi/image-digest: {{ .Values.image.digest | quote }}
    spec:
      containers:
        - name: metapi
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "metapi.fullname" . }}-env
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: metapi-data
              mountPath: /app/data
      volumes:
        - name: metapi-data
          hostPath:
            path: {{ .Values.persistence.hostPath }}
            type: DirectoryOrCreate
