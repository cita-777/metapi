name: Feature request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Keep this issue focused on one feature request.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues to avoid creating a duplicate
          required: true
        - label: I confirmed this feature is not already available in the latest release or main branch
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve?
      placeholder: Explain the workflow or pain point behind this request.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
      placeholder: Explain the feature or behavior you want added.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workaround or alternative you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, or links if they help explain the request.
