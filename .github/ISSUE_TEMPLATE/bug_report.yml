name: Bug report
description: Report a reproducible problem in Metapi
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues to avoid creating a duplicate
          required: true
        - label: I tested on the latest release or current main branch
          required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      description: Where did you reproduce the problem?
      options:
        - Web app
        - Desktop app
        - Server only
        - Docker deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: Describe the problem you observed.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Configure ...
        3. Send request ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or error output
      description: Paste logs or attach screenshots if available.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, browser, app version, database type, or other relevant details.
      placeholder: |
        OS:
        Browser:
        Metapi version:
        Database:
